{% extends 'base.html' %}
{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
      <div class="card border-0 shadow-sm">
        <div class="card-body p-5">
          <div class="text-center mb-4">
            <div class="mb-3">
              <div class="bg-light rounded-circle d-inline-flex align-items-center justify-content-center" style="width: 72px; height: 72px;">
                <i class="bi bi-person-plus text-primary fs-1"></i>
              </div>
            </div>
            <h2 class="h3 mb-2">Create Account</h2>
            <p class="mb-0 text-muted">Sign up for a new account</p>
          </div>
          
          {% if messages %}
            {% for message in messages %}
              <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
              </div>
            {% endfor %}
          {% endif %}
          
          <form method="post" class="mt-4">
            {% csrf_token %}
            <div class="mb-4">
              <label for="username" class="form-label fw-semibold">Username</label>
              <div class="input-group">
                <span class="input-group-text">
                  <i class="bi bi-person"></i>
                </span>
                <input type="text" class="form-control form-control-lg" id="username" name="username" placeholder="Choose a username" required>
              </div>
            </div>
            <div class="mb-4">
              <label for="email" class="form-label fw-semibold">Email Address</label>
              <div class="input-group">
                <span class="input-group-text">
                  <i class="bi bi-envelope"></i>
                </span>
                <input type="email" class="form-control form-control-lg" id="email" name="email" placeholder="Enter your email" required>
              </div>
            </div>
            <div class="mb-4">
              <label for="password" class="form-label fw-semibold">Password</label>
              <div class="input-group">
                <span class="input-group-text">
                  <i class="bi bi-lock"></i>
                </span>
                <input type="password" class="form-control form-control-lg" id="password" name="password" placeholder="Create a password" required>
              </div>
            </div>
            <div class="mb-4">
              <label for="confirm_password" class="form-label fw-semibold">Confirm Password</label>
              <div class="input-group">
                <span class="input-group-text">
                  <i class="bi bi-lock-fill"></i>
                </span>
                <input type="password" class="form-control form-control-lg" id="confirm_password" name="confirm_password" placeholder="Confirm your password" required>
              </div>
            </div>
            <div class="mb-4">
              <label for="user_type" class="form-label fw-semibold">Account Type</label>
              <div class="input-group">
                <span class="input-group-text">
                  <i class="bi bi-person-badge"></i>
                </span>
                <select class="form-select form-control-lg" id="user_type" name="user_type" required>
                  <option value="">Select account type</option>
                  <option value="patient">Patient</option>
                  <option value="doctor">Doctor</option>
                </select>
              </div>
            </div>
            <div class="mb-4 form-check">
              <input type="checkbox" class="form-check-input" id="terms" required>
              <label class="form-check-label" for="terms">I agree to the <a href="{% url 'terms' %}" class="text-decoration-none">Terms of Service</a> and <a href="{% url 'privacy' %}" class="text-decoration-none">Privacy Policy</a></label>
            </div>
            <div class="d-grid">
              <button type="submit" class="btn btn-primary btn-lg">Sign Up</button>
            </div>
          </form>
          
          <div class="text-center mt-4">
            <p class="mb-0">Already have an account? <a href="{% url 'login' %}" class="text-decoration-none">Sign in</a></p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
